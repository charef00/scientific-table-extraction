<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing Complete</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .success-icon {
            font-size: 4rem;
            color: #198754;
        }
        .image-card img {
            max-height: 200px;
            object-fit: contain;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-4">

    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary back-btn">
        <i class="bi bi-arrow-left"></i> Back to Search
    </a>

    <!-- SUCCESS HEADER -->
    <div class="text-center mb-4">
        <div class="success-icon mb-2">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        <h2>Select tables to continue !</h2>
    
    </div>

    <!-- FORM -->
    <form method="POST" action="{{ url_for('process_tables') }}" >

        <div class="row g-4">

            {% for img in images %}
            <div class="col-md-12">
                   

                    <div class="card-body text-center">
                        <div class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="selected_images"
                                   value="{{ img }}"
                                   id="chk_{{ loop.index }}">
                            <label class="form-check-label" for="chk_{{ loop.index }}">
                                <img src="http://localhost:5000/tables/{{ img }}" class="img-fluid"
                         class="card-img-top p-2"
                         alt="{{ img }}" style="    margin: auto;width: 90%;">
                            </label>
                        </div>
                        <small class="text-muted d-block mt-1">{{ img }}</small>
                    </div>
            </div>
            {% endfor %}

        </div>

        <!-- SUBMIT -->
        <div class="text-center mt-5">
            <button type="submit" class="btn btn-success btn-lg px-5">
                <i class="bi bi-arrow-right-circle"></i>
                Continue to Next Step
            </button>
        </div>

    </form>

</div>

</body>
</html>
