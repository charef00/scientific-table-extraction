<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scopus Article Search</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h3 class="card-title text-center mb-4">
                        Scientific Article Search (Scopus)
                    </h3>

                    <form method="post" action="./search">

                        <div class="mb-3">
                            <label class="form-label">
                                Keywords :
                            </label>
                            <input type="text"
                                name="keywords"
                                class="form-control"
                                placeholder="traffic safety"
                                required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">
                                    Year from :
                                </label>
                                <input type="number"
                                    name="year_from"
                                    class="form-control"
                                    placeholder="2022"
                                    min="1900"
                                    max="2100">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    Year to :
                                </label>
                                <input type="number"
                                    name="year_to"
                                    class="form-control"
                                    placeholder="2026"
                                    min="1900"
                                    max="2100">
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Search Articles
                            </button>
                        </div>

                    </form>


                </div>
            </div>

            <button type="button" class="btn btn-primary btn-lg" onclick="clearAllFiles()">
                Clear All
            </button>
            <script>
        function clearAllFiles() {
            if (!confirm("Are you sure you want to delete all files?")) {
                return;
            }

            fetch("/clear-all", {
                method: "POST"
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    alert("All files deleted successfully!");
                    location.reload();
                }
            })
            .catch(err => {
                alert("Error while deleting files");
                console.error(err);
            });
        }
        </script>

        </div>
    </div>
</div>

</body>
</html>
